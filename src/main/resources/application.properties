# Application
spring.application.name=DentBridge
server.port=8080

# ===============================
# DATABASE (Railway PostgreSQL)
# ===============================
#spring.datasource.url=${DATABASE_URL:}
#spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===============================
# FLYWAY (Database Migration)
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=${JWT_SECRET:defaultsecretkey}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===============================
# CORS CONFIGURATION
# ===============================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ===============================
# GOOGLE CALENDAR (OPTIONAL)
# ===============================
google.calendar.enabled=${GOOGLE_CALENDAR_ENABLED:false}
google.calendar.credentials-path=${GOOGLE_CALENDAR_CREDENTIALS_PATH:}
google.calendar.id=${GOOGLE_CALENDAR_ID:primary}

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ===============================
# LOGGING
# ===============================
logging.level.com.dentbridge=INFO
logging.level.org.springframework.security=DEBUG
