# Application Configuration
spring.application.name=DentBridge
server.port=8080


# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:dentbridge}
spring.datasource.username=postgres
spring.datasource.password=5865
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Google Calendar Configuration (Optional)
google.calendar.enabled=${GOOGLE_CALENDAR_ENABLED:false}
google.calendar.credentials-path=${GOOGLE_CALENDAR_CREDENTIALS_PATH:}
google.calendar.id=${GOOGLE_CALENDAR_ID:primary}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.com.dentbridge=INFO
logging.level.org.springframework.security=DEBUG
